version: '3.8'

services:
  mongo:
    image: mongo:6
    container_name: labelforge_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: labelforge_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/annotationdb
      - JWT_SECRET=change_this_in_production_please
      - CLIENT_URL=http://localhost:3000
    depends_on:
      - mongo
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build: ./frontend
    container_name: labelforge_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data:
  uploads_data:
